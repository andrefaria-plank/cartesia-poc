<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NOA Voice Mode — test</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
      button { font-size: 18px; padding: 12px 20px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }
      #status { color: #666; margin: 12px 0; }
      .msg { padding: 8px 12px; border-radius: 10px; margin: 6px 0; }
      .user { background: #e8f0fe; } .noa { background: #f1f3f4; }
      .card { background: #fff8e1; border: 1px solid #f0d000; }
    </style>
  </head>
  <body>
    <h1>NOA Voice Mode</h1>
    <p id="status">idle</p>
    <button id="start">Start voice mode</button>
    <button id="talk" disabled>Talk</button>
    <button id="end" disabled>End</button>
    <div id="log"></div>

    <script type="module">
      const SR = 16000;
      let sessionId = null;
      let es = null;
      let ctx = null;
      let playHead = 0;

      const $ = (id) => document.getElementById(id);
      const setStatus = (t) => ($("status").textContent = t);
      const log = (text, cls) => {
        const d = document.createElement("div");
        d.className = `msg ${cls}`;
        d.textContent = text;
        $("log").appendChild(d);
      };

      // Render a tool-result card (structured data → readable rows). Voice never reads this.
      const renderCard = (card) => {
        const titles = {
          client: "Client", invoices: "Invoices", visits: "Technical visits",
          deliveries: "Deliveries", payments: "Payments", error: "Error",
        };
        const d = document.createElement("div");
        d.className = "msg card";
        const head = document.createElement("strong");
        head.textContent = "📋 " + (titles[card.type] ?? card.type);
        d.appendChild(head);
        const pre = document.createElement("pre");
        pre.style.cssText = "margin:6px 0 0; white-space:pre-wrap; font-size:13px;";
        const { type, ...rest } = card;
        pre.textContent = JSON.stringify(rest, null, 2);
        d.appendChild(pre);
        $("log").appendChild(d);
      };

      // ── ordered, gapless playback queue (filler first, then audio chunks) ──
      function enqueuePcm(b64) {
        const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
        const i16 = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.byteLength / 2);
        const buf = ctx.createBuffer(1, i16.length, SR);
        const f32 = buf.getChannelData(0);
        for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        const start = Math.max(playHead, ctx.currentTime);
        src.start(start);
        playHead = start + buf.duration;
      }

      $("start").onclick = async () => {
        ctx = new AudioContext({ sampleRate: SR });
        playHead = ctx.currentTime;
        sessionId = crypto.randomUUID();
        es = new EventSource(`/voice/stream/${sessionId}`);

        es.addEventListener("ready", () => {
          setStatus("ready — hold to talk");
          $("start").disabled = true;
          $("talk").disabled = false;
          $("end").disabled = false;
        });
        es.addEventListener("transcript", (e) => log("You: " + JSON.parse(e.data).text, "user"));
        es.addEventListener("text", (e) => {
          // append streamed agent text to the latest NOA bubble
          let last = $("log").lastElementChild;
          if (!last || !last.classList.contains("noa")) {
            last = document.createElement("div");
            last.className = "msg noa";
            last.textContent = "NOA: ";
            $("log").appendChild(last);
          }
          last.textContent += JSON.parse(e.data).delta;
        });
        es.addEventListener("card", (e) => {
          renderCard(JSON.parse(e.data).card);
          // chime.play();  // <- play your card chime here
        });
        es.addEventListener("filler", (e) => enqueuePcm(JSON.parse(e.data).audio));
        es.addEventListener("audio", (e) => enqueuePcm(JSON.parse(e.data).audio));
        es.addEventListener("done", () => setStatus("ready — hold to talk")); // no barge-in: re-arm only now
        es.addEventListener("error", (e) => setStatus("error: " + (e.data ?? "stream")));
      };

      // ── tap-to-talk: tap once to listen, auto-stops when you stop speaking ──
      const SILENCE_RMS = 0.012;      // below this counts as silence
      const SILENCE_HOLD_MS = 1500;   // trailing silence that ends a turn
      const MAX_TURN_MS = 30000;      // hard cap so a turn can't run forever

      let rec = null, chunks = [], micStream = null;
      let vadRAF = null, silenceSince = 0, hasSpoken = false, listening = false, maxTimer = null;

      async function startListening() {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(micStream);
        chunks = [];
        rec.ondataavailable = (e) => chunks.push(e.data);
        rec.onstop = async () => {
          stopVad();
          micStream.getTracks().forEach((t) => t.stop());
          listening = false;
          $("talk").textContent = "Talk";
          const fd = new FormData();
          fd.append("audio", new Blob(chunks, { type: "audio/webm" }), "turn.webm");
          setStatus("thinking…");
          await fetch(`/voice/message/${sessionId}`, { method: "POST", body: fd });
        };
        rec.start();
        listening = true;
        hasSpoken = false;
        silenceSince = 0;
        $("talk").textContent = "Listening… (tap to stop)";
        setStatus("listening…");
        startVad(micStream);
        maxTimer = setTimeout(stopRec, MAX_TURN_MS);
      }

      function startVad(stream) {
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        ctx.createMediaStreamSource(stream).connect(analyser);
        const data = new Float32Array(analyser.fftSize);
        const tick = () => {
          analyser.getFloatTimeDomainData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
          const rms = Math.sqrt(sum / data.length);
          const now = performance.now();
          if (rms >= SILENCE_RMS) {
            hasSpoken = true;       // don't end on the pause BEFORE the user starts
            silenceSince = 0;
          } else if (hasSpoken) {
            if (silenceSince === 0) silenceSince = now;
            else if (now - silenceSince > SILENCE_HOLD_MS) { stopRec(); return; }
          }
          vadRAF = requestAnimationFrame(tick);
        };
        vadRAF = requestAnimationFrame(tick);
      }
      function stopVad() {
        if (vadRAF) cancelAnimationFrame(vadRAF);
        if (maxTimer) clearTimeout(maxTimer);
        vadRAF = null; maxTimer = null;
      }
      function stopRec() {
        if (rec && rec.state !== "inactive") rec.stop();
      }

      // Tap once to start; tap again to cut the turn short.
      $("talk").onclick = () => (listening ? stopRec() : startListening());

      $("end").onclick = () => {
        es?.close();
        ctx?.close();
        setStatus("ended");
        $("start").disabled = false;
        $("talk").disabled = true;
        $("end").disabled = true;
      };
    </script>
  </body>
</html>
